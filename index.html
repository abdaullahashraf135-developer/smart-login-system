<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smart Login System</title>
    <link rel="stylesheet" href="./css/all.min.css" />
    <link rel="stylesheet" href="./css/bootstrap.min.css" />
    <link rel="stylesheet" href="./css/fontawesome.min.css" />
    <link rel="stylesheet" href="./css/style.css" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <div id="loading-screen" class="loading-screen">
        <div class="loading-content">
            <div class="spinner"></div>
            <p class="loading-text">Loading...</p>
            <div class="loading-bar">
                <div class="loading-progress"></div>
            </div>
        </div>
    </div>

    <div id="login-section" class="auth-container auth-page-visible">
        <div class="auth-card">
            <div class="auth-header">
                <i class="fas fa-lock-open"></i>
                <h1>Login</h1>
                <p>Welcome back</p>
            </div>
            <form id="login-form">
                <div class="form-group">
                    <label for="login-email"><i class="fas fa-envelope"></i> Email</label>
                    <input type="email" class="form-control" id="login-email" placeholder="your@email.com" required />
                </div>
                <div class="form-group">
                    <label for="login-password"><i class="fas fa-key"></i> Password</label>
                    <input type="password" class="form-control" id="login-password" placeholder="••••••••" required />
                </div>
                <div class="form-options">
                    <label class="remember-me">
                        <input type="checkbox"> Remember me
                    </label>
                    <a href="#" class="forgot-password">Forgot password?</a>
                </div>
                <button id="login-btn" type="submit" class="btn-primary-custom">
                    <span>Login</span>
                    <i class="fas fa-arrow-right"></i>
                </button>
                <div class="auth-footer">
                    <p>Don't have an account? <a href="#" id="to-signup-from-login">Create one</a></p>
                </div>
            </form>
        </div>
    </div>

    <div id="signup-section" class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <i class="fas fa-user-plus"></i>
                <h1>Create Account</h1>
                <p>Join us today</p>
            </div>
            <form id="signup-form">
                <div class="form-group">
                    <label for="signup-name"><i class="fas fa-user"></i> Full Name</label>
                    <input type="text" class="form-control" id="signup-name" placeholder="John Doe" required />
                </div>
                <div class="form-group">
                    <label for="signup-email"><i class="fas fa-envelope"></i> Email</label>
                    <input type="email" class="form-control" id="signup-email" placeholder="your@email.com" required />
                </div>
                <div class="form-group">
                    <label for="signup-password"><i class="fas fa-key"></i> Password</label>
                    <input type="password" class="form-control" id="signup-password" placeholder="••••••••" required />
                </div>
                <button id="signup-btn" type="submit" class="btn-primary-custom">
                    <span>Create Account</span>
                    <i class="fas fa-arrow-right"></i>
                </button>
                <div class="auth-footer">
                    <p>Already have an account? <a href="#" id="to-login-from-signup">Sign in</a></p>
                </div>
            </form>
        </div>
    </div>

    <section id="home-section" class="home-section">
        <nav class="navbar navbar-expand-lg navbar-modern">
            <div class="container-fluid">
                <a class="navbar-brand" href="#">
                    <i class="fas fa-shield-alt"></i>
                    <span>Smart Login</span>
                </a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarSupportedContent">
                    <div class="ms-auto navbar-actions">
                        <button id="logout-btn" class="btn-danger-custom">
                            <i class="fas fa-sign-out-alt"></i>
                            Logout
                        </button>
                    </div>
                </div>
            </div>
        </nav>
        <div class="welcome-content">
            <div class="welcome-card">
                <div class="welcome-icon">
                    <i class="fas fa-check-circle"></i>
                </div>
                <h1>Welcome, <span id="user-name"></span>!</h1>
                <p>You have successfully logged into your account.</p>
                <div class="welcome-stats">
                    <div class="stat-item">
                        <i class="fas fa-calendar"></i>
                        <span id="login-date">Last login: Today</span>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script src="./js/all.min.js"></script>
    <script src="./js/bootstrap.bundle.js"></script>
    <script src="./js/app.js"></script>
</body>

</html>
